<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8" />
    <title>관리자 대시보드</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet" />
</head>

<body class="bg-gray-100 min-h-screen flex flex-col">

    <header class="bg-gray-900 shadow z-20">
        <div class="max-w-6xl mx-auto px-4 py-3 flex items-center justify-between">
            <div class="flex items-center space-x-2">
                <a href="index.html" class="flex items-center space-x-2">
                    <span class="text-white font-extrabold text-xl">파파고 Admin</span>
                    <span class="text-gray-400 text-sm">주차장 예약 관리 시스템</span>
                </a>
            </div>
            <nav class="flex items-center space-x-4 text-sm" id="nav-menu">
                <a href="index.html"
                    class="text-gray-300 hover:text-white px-3 py-1.5 border border-gray-600 rounded-md transition-colors">메인
                    서비스로 돌아가기</a>
            </nav>
        </div>
    </header>

    <main class="flex-1 px-4 py-8">
        <div class="max-w-6xl mx-auto">
            <div class="bg-white rounded-xl shadow-xl border border-gray-100 p-6 overflow-hidden">
                <h2 class="text-2xl font-bold mb-6 text-gray-900 flex items-center gap-2">
                    <span class="text-3xl"></span> 전체 예약 현황 대시보드
                </h2>

                <div class="overflow-x-auto rounded-lg border border-gray-200">
                    <table class="w-full text-sm text-left text-gray-600">
                        <thead class="text-xs text-gray-700 uppercase bg-gray-100 border-b">
                            <tr>
                                <th scope="col" class="px-6 py-4 font-bold text-gray-900">주차장 이름</th>
                                <th scope="col" class="px-6 py-4 font-bold text-gray-900">예약자명</th>
                                <th scope="col" class="px-6 py-4 font-bold text-gray-900">이메일</th>
                                <th scope="col" class="px-6 py-4 font-bold text-gray-900">예약 날짜</th>
                                <th scope="col" class="px-6 py-4 font-bold text-gray-900">예약 시간</th>
                                <th scope="col" class="px-6 py-4 font-bold text-center text-gray-900">관리</th>
                            </tr>
                        </thead>
                        <tbody id="admin-reservation-list">

                            <tr>
                                <td colspan="5" class="px-6 py-12 text-center text-gray-500">
                                    <svg class="animate-spin h-8 w-8 text-gray-400 mx-auto mb-3"
                                        xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor"
                                            stroke-width="4"></circle>
                                        <path class="opacity-75" fill="currentColor"
                                            d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z">
                                        </path>
                                    </svg>
                                    데이터를 불러오는 중입니다...
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <script type="module" src="./scripts/admin.js"></script>
</body>

</html>
